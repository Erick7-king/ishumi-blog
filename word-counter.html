<!DOCTYPE html><html>
<head>
<title>Word Counter</title>
<meta charset="utf-8">
</head>
<body><h1>Word Counter</h1><textarea id="text"
style="width:100%;height:200px;">
</textarea><br><br>

<button onclick="countWords()">
Count Words
</button><h2 id="result"></h2><script>

function countWords(){

let text =
document.getElementById("text").value;

let count =
text.trim().split(/\s+/).length;

document.getElementById("result")
.innerHTML =
"Words: " + count;

}

</script></body>
</html>
