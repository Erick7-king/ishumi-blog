<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>Password Generator</title>
</head>
<body><h1>Password Generator</h1><button onclick="generate()">
Generate Password
</button><h2 id="output"></h2><script>

function generate(){

let chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let pass = "";

for(let i=0;i<12;i++){

pass += chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

document.getElementById("output")
.innerHTML = pass;

}

</script></body>
</html>
