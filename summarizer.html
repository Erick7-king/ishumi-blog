<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Text Summarizer</title><style>
body{
font-family:Arial,sans-serif;
background:#121212;
color:white;
padding:20px;
max-width:900px;
margin:auto;
}

textarea{
width:100%;
height:250px;
background:#242424;
color:white;
border:none;
padding:10px;
border-radius:10px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

#output{
margin-top:20px;
background:#242424;
padding:15px;
border-radius:10px;
min-height:100px;
}
</style></head><body><h1>AI Text Summarizer</h1><p>
Paste a long article below and click Summarize.
</p><textarea id="input"></textarea><br><button onclick="summarize()">
Summarize
</button><div id="output">
Summary will appear here...
</div><script>
function summarize(){

let text =
document.getElementById("input").value;

let sentences =
text.split(".");

let summary =
sentences.slice(0,3).join(".");

document.getElementById("output")
.innerHTML = summary;

}
</script></body>
</html>
